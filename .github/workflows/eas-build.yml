name: EAS Build

on:
  push:
    branches: [main]
    paths:
      - "mobile-app/**"
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform to build"
        required: true
        default: "android"
        type: choice
        options:
          - android
          - ios
          - all
      profile:
        description: "Build profile"
        required: true
        default: "preview-apk"
        type: choice
        options:
          - preview-apk
          - preview
          - production

jobs:
  build:
    name: EAS Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build (manual trigger)
        if: github.event_name == 'workflow_dispatch'
        run: eas build --non-interactive --platform ${{ inputs.platform }} --profile ${{ inputs.profile }}

      - name: Build (push to main)
        if: github.event_name == 'push'
        run: eas build --non-interactive --platform android --profile preview-apk
